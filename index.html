<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orações</title>
    <link rel="shortcut icon" href="Teens.png" type="image/x-png">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <div id="conteudo">=
      <picture>
        <source media="(max-width: 1150px)" srcset="Teens 2.png" type="image/png" id="img">
        <img src="Teens 700.png" alt="Teens" id="img">
      </picture>
        <div id="forms">
          <form
            action="https://formsubmit.co/intercessoresflame@gmail.com"
            method="POST"
            class="form"
          >
          <h1>Caixinha de orações!</h1>
            <label for="name">Nome (Opcional)</label>
            <input type="text" name="name" id="name" />
            <label for="email">E-mail (Opcional)</label>
            <input type="email" name="email" id="email" />
            <label for="message">Oração</label>
            <textarea name="message" id="message" required></textarea>
            <input type="hidden" name="_captcha" value="false" />
            <input
              type="hidden"
              name="_next"
              value="http://beabeltech.github.io/obrigado.html"
            />
            <button type="submit">Enviar</button>
          </form>
        </div>
    </div>
    
  </body>
</html>
